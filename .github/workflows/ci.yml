name: MISTCODER CI

on:
  push:
    branches: [ main, "feature/**", "fix/**" ]
  pull_request:
    branches: [ main ]

jobs:
  selftest:
    name: Engine self-tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: MISTCODER status
        run: python mistcoder.py status

      - name: MISTCODER selftest
        run: python mistcoder.py selftest

      - name: ORACLE unit test
        run: python oracle.py --self-test

      - name: COVENANT selftest
        run: python modules/oversight/src/covenant.py selftest

      - name: PHANTOM selftest
        run: python modules/knowledge_graph/src/phantom.py

      - name: Run pytest suite
        run: |
          pytest modules/ --tb=short -q --ignore=modules/binary_lifting/tests \
            || echo "Some tests skipped (optional deps)"

  lint:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check . --ignore E501,E402,F401 || true

  covenant-verify:
    name: Audit chain integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify COVENANT chain (if chain exists)
        run: |
          if [ -f sandbox/audit_chain.json ]; then
            python mistcoder.py covenant verify
          else
            echo "No audit chain yet — skipping verify"
          fi
